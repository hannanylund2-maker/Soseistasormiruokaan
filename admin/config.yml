backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "recipes"
    label: "Reseptit"
    folder: "content/recipes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Reseptin nimi", name: "title", widget: "string" }
      - { label: "Kuvaus", name: "description", widget: "text" }
      - { label: "Emoji", name: "emoji", widget: "string" }
      - label: "Ikäsuositus"
        name: "age"
        widget: "select"
        options: ["6 kk+", "8 kk+", "10 kk+", "12 kk+"]
      - { label: "Valmistusaika", name: "time", widget: "string" }
      - { label: "Annokset", name: "portions", widget: "string" }
      - { label: "Tagit", name: "tags", widget: "list" }
      - label: "Ainekset"
        name: "ingredients"
        widget: "list"
        fields:
          - { label: "Määrä", name: "amount", widget: "string" }
          - { label: "Ainesosa", name: "name", widget: "string" }
      - label: "Vaiheet"
        name: "steps"
        widget: "list"
        field: { label: "Vaihe", name: "step", widget: "string" }
      - { label: "Vinkki", name: "tip", widget: "text" }
      - { label: "Julkaistu", name: "published", widget: "boolean", default: true }
